<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pokémon Sprite Ranker</title>

<link href="https://fonts.cdnfonts.com/css/pokemon-solid" rel="stylesheet">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
  text-align: center;
  padding-top: 70px;
}

/* HOME */
#homeScreen {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.title {
  font-family: 'Pokemon Solid', Arial;
  font-size: 48px;
  color: #ffcb05;
  text-shadow: 4px 4px #2a75bb;
  margin-bottom: 40px;
}

/* POKEBALL */
#pokeballBtn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.top { background: red; height: 50%; }
.bottom { background: white; height: 50%; }

.middle {
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 10px;
  background: black;
  transform: translateY(-50%);
}

#pokeballBtn::after {
  content: "";
  position: absolute;
  width: 28px;
  height: 28px;
  background: white;
  border: 6px solid black;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* LOADING */
#loadingScreen {
  position: fixed;
  inset: 0;
  background: #000;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#loadingBar {
  width: 260px;
  height: 18px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 20px;
}

#loadingFill {
  height: 100%;
  width: 0%;
  background: #ffcb05;
}

/* LIST */
#list {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.pokemon {
  background: #1a1a1a;
  margin: 8px;
  padding: 10px;
  width: 90%;
  max-width: 300px;
}

.pokemon img {
  width: 96px;
}

/* PICKER */
#spritePicker {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
}

#options {
  padding: 20px;
}

#options img {
  width: 96px;
  margin: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homeScreen">
  <h1 class="title">Pokémon Sprite Ranking</h1>

  <div id="pokeballBtn">
    <div class="top"></div>
    <div class="middle"></div>
    <div class="bottom"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <h2>Lade Pokémon...</h2>
  <div id="loadingBar">
    <div id="loadingFill"></div>
  </div>
  <p id="loadingText">0%</p>
</div>

<!-- APP -->
<h2>Pokémon Sprite Ranker</h2>

<div id="list"></div>

<div id="spritePicker">
  <div id="options"></div>
  <button onclick="closePicker()">Schließen</button>
</div>

<script>
const list = document.getElementById("list");
const picker = document.getElementById("spritePicker");

let options = null;
let currentImg = null;

const loadingScreen = document.getElementById("loadingScreen");
const fill = document.getElementById("loadingFill");
const text = document.getElementById("loadingText");

/* ================= START SAFE ================= */
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("pokeballBtn").addEventListener("click", start);
});

function start() {
  document.getElementById("homeScreen").style.display = "none";
  loadingScreen.style.display = "flex";

  options = document.getElementById("options"); // 🔥 FIX: safe init

  list.innerHTML = "";
  load();
}

/* ================= LOAD ================= */
async function load() {
  const total = 151;

  for (let id = 1; id <= total; id++) {

    try {
      const res = await fetch(`https://pokeapi.co/api/v2/pokemon/`);
      const data = await res.json();

      const speciesRes = await fetch(data.species.url);
      const species = await speciesRes.json();

      const german =
        species.names.find(n => n.language.name === "de")?.name ||
        data.name;

      create(data, german);

    } catch (e) {
      console.warn("Fehler bei Pokémon:", id);
    }

    const percent = Math.round((id / total) * 100);
    fill.style.width = percent + "%";
    text.innerText = percent + "%";
  }

  loadingScreen.style.display = "none";
}

/* ================= CREATE ================= */
function create(data, name) {
  const div = document.createElement("div");
  div.className = "pokemon";

  const img = document.createElement("img");
  img.src = data.sprites.front_default;

  const p = document.createElement("p");
  p.innerText = name;

  img.onclick = () => open(data, img);

  div.appendChild(img);
  div.appendChild(p);
  list.appendChild(div);
}

/* ================= SPRITE PICKER ================= */
function open(data, img) {
  currentImg = img;

  if (!options) options = document.getElementById("options"); // 🔥 safety fix
  options.innerHTML = "";

  const name = data.name;

  const sprites = [
    data.sprites.front_default,
    `https://play.pokemonshowdown.com/sprites/ani/.gif`
  ].filter(Boolean);

  sprites.forEach(src => {
    const im = document.createElement("img");
    im.src = src;

    im.onclick = () => {
      currentImg.src = src;
      closePicker();
    };

    options.appendChild(im);
  });

  picker.style.display = "block";
}

function closePicker() {
  picker.style.display = "none";
}
</script>

</body>
</html>
