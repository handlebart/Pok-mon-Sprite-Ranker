<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pokémon Sprite Ranker</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:#0b0f1a;
}

#start { margin-top:90px; }

h2 {
  font-family:"Press Start 2P";
  font-size:18px;
}

/* Pokéball Buttons */
.pokeballBtn {
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  margin:20px;
  cursor:pointer;
  background:linear-gradient(to bottom,#ff2a2a 50%,white 50%);
  position:relative;
}

.pokeballBtn::before {
  content:"";
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:8px;
  background:black;
  transform:translateY(-50%);
}

.pokeballBtn::after {
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  background:white;
  border:5px solid black;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.btnLabel {
  font-family:"Press Start 2P";
  font-size:11px;
}

/* APP */
#app { display:none; }

/* STICKY BAR */
#counterBar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  display:flex;
  gap:6px;
  padding:8px;
  font-size:11px;
  z-index:999;
}

.counterItem {
  flex:1;
  background:rgba(0,0,0,0.6);
  border-radius:8px;
  padding:6px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* LIST */
#list {
  margin-top:80px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.pokemon {
  width:92%;
  max-width:340px;
  margin:10px;
  padding:12px;
  background:rgba(0,0,0,0.6);
  border-radius:12px;
}

.pokemon img {
  width:96px;
}

/* PICKER */
#spritePicker {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  padding:20px;
  overflow-y:auto;
}

#options {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:18px;
}

.sprite img {
  width:110px;
  cursor:pointer;
}

.label {
  font-size:12px;
  color:#ccc;
}
</style>
</head>

<body>

<div id="start">
  <h2>Was willst du ranken?</h2>

  <button class="pokeballBtn" onclick="startGen(1)"></button>
  <div class="btnLabel">GEN 1</div>

  <button class="pokeballBtn" onclick="startGen(2)"></button>
  <div class="btnLabel">GEN 2</div>
</div>

<div id="app">
  <div id="counterBar"></div>
  <button onclick="back()" style="margin-top:60px;">← Zurück</button>
  <div id="list"></div>
</div>

<div id="spritePicker">
  <h3>Sprite auswählen</h3>
  <div id="options"></div>
</div>

<script>
let range=[1,151];
let mode=1;

let list,counterBar,options;

let selections={};
let counter={};

document.addEventListener("DOMContentLoaded",()=>{
  list=document.getElementById("list");
  counterBar=document.getElementById("counterBar");
  options=document.getElementById("options");
});

/* 🔥 SAFE FETCH */
async function fetchSafe(url,retries=2){
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url);
      if(!r.ok) throw new Error("HTTP "+r.status);
      return await r.json();
    }catch(e){
      if(i===retries) throw e;
      await new Promise(res=>setTimeout(res,200));
    }
  }
}

/* 🔥 LOADER (STABLE FOR GITHUB PAGES) */
async function load(){
  for(let id=range[0]; id<=range[1]; id++){

    try{
      const d = await fetchSafe(`https://pokeapi.co/api/v2/pokemon/`);

      let name = d.name;

      try{
        const s = await fetchSafe(d.species.url);
        name =
          s.names?.find(n=>n.language.name==="de")?.name ||
          d.name;
      }catch{}

      create(d,name);

    }catch(e){
      console.log("FAIL:",id);
      createFallback(id);
    }

    await new Promise(r=>setTimeout(r,60));
  }
}

/* 🔥 SAFE SPRITE HANDLING */
function getSafeSprite(d){
  return (
    d.sprites?.front_default ||
    d.sprites?.other?.["official-artwork"]?.front_default ||
    d.sprites?.other?.home?.front_default ||
    null
  );
}

function create(d,name){
  const div=document.createElement("div");
  div.className="pokemon";

  const img=document.createElement("img");

  const sprite = getSafeSprite(d);

  if(sprite){
    img.src = sprite;
  } else {
    img.src = "https://via.placeholder.com/96?text=?";
    img.style.opacity="0.5";
  }

  const p=document.createElement("p");
  p.innerText=name;

  div.append(img,p);
  div.onclick=()=>open(d,img);

  list.appendChild(div);
}

function createFallback(id){
  const div=document.createElement("div");
  div.className="pokemon";

  div.innerHTML=`
    <p>#</p>
    <p style="opacity:0.6">nicht geladen</p>
  `;

  list.appendChild(div);
}

/* START */
function startGen(gen){
  mode=gen;

  document.getElementById("start").style.display="none";
  document.getElementById("app").style.display="block";

  list.innerHTML="";
  selections={};
  counter={};

  range = gen===1 ? [1,151] : [152,251];

  buildCounterBar();
  load();
}

function back(){
  document.getElementById("app").style.display="none";
  document.getElementById("start").style.display="block";
}

/* STICKY BAR */
function buildCounterBar(){
  counterBar.innerHTML="";

  const gens = mode===1
    ? ["gen1","gen2","gen3","gen4","gen5","modern"]
    : ["gen2","gen3","gen4","gen5","modern"];

  gens.forEach(g=>{
    counter[g]=0;

    const div=document.createElement("div");
    div.className="counterItem";

    div.innerHTML=`<div></div><div id="">0%</div>`;
    counterBar.appendChild(div);
  });
}

/* SPRITE PICKER */
function open(d,img){
  options.innerHTML="";
  document.getElementById("spritePicker").style.display="block";

  const s=d.sprites;
  const name=d.name.replace(/-/g,"");

  const arr=[
    {src:s.versions?.["generation-i"]?.["red-blue"]?.front_default,gen:"gen1",label:"Gen 1"},
    {src:s.versions?.["generation-ii"]?.crystal?.front_default,gen:"gen2",label:"Gen 2"},
    {src:s.versions?.["generation-iii"]?.emerald?.front_default,gen:"gen3",label:"Gen 3"},
    {src:s.versions?.["generation-iv"]?.platinum?.front_default,gen:"gen4",label:"Gen 4"},
    {
      src:s.versions?.["generation-v"]?.["black-white"]?.animated?.front_default ||
          s.versions?.["generation-v"]?.["black-white"]?.front_default,
      gen:"gen5",
      label:"Gen 5"
    },
    {
      src:`https://play.pokemonshowdown.com/sprites/ani/.gif`,
      gen:"modern",
      label:"Modern"
    }
  ];

  arr.filter(x=>x.src).forEach(s=>{
    const wrap=document.createElement("div");
    wrap.className="sprite";

    const im=document.createElement("img");
    im.src=s.src;

    const label=document.createElement("div");
    label.className="label";
    label.innerText=s.label;

    im.onclick=()=>{
      if(selections[d.id]) counter[selections[d.id]]--;

      selections[d.id]=s.gen;
      counter[s.gen]++;

      img.src=s.src;
      update();
      closePicker();
    };

    wrap.append(im,label);
    options.appendChild(wrap);
  });
}

/* UPDATE */
function update(){
  const total=Object.values(counter).reduce((a,b)=>a+b,0);
  if(!total)return;

  Object.keys(counter).forEach(k=>{
    const el=document.getElementById(k);
    if(el) el.innerText=Math.round(counter[k]/total*100)+"%";
  });
}

function closePicker(){
  document.getElementById("spritePicker").style.display="none";
}
</script>

</body>
</html>
