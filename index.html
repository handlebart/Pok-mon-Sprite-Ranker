<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pokémon Sprite Ranker</title>

<style>
:root {
  --bar-height: 64px;
}

body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  overflow-x: hidden;
}

#counterBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--bar-height);
  z-index: 999;

  display: flex;
  justify-content: space-between;
  gap: 6px;

  padding: 8px;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
  font-size: 11px;
}

.counterItem {
  flex: 1;
  border-radius: 10px;
  padding: 6px 4px;
  background: #1a1a1a;
  border: 1px solid #333;
  text-align: center;
}

.counterLabel {
  font-size: 10px;
  color: #aaa;
}

.counterValue {
  font-size: 13px;
  font-weight: bold;
}

#list {
  margin-top: var(--bar-height);
  padding: 16px;

  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;

  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.pokemon {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 10px;
  text-align: center;
  transition: transform 0.15s ease;
  cursor: pointer;
}

.pokemon:active {
  transform: scale(0.97);
}

.pokemon img {
  width: 96px;
  image-rendering: pixelated;
}

.pokemon p {
  margin: 8px 0 0 0;
  font-size: 14px;
  color: #ddd;
}

#spritePicker {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  display: none;
  overflow-y: auto;
  padding: 20px;
}

.sprite {
  display: inline-block;
  margin: 10px;
  text-align: center;
}

.sprite img {
  width: 96px;
  border-radius: 10px;
}

.label {
  font-size: 11px;
  margin-top: 4px;
  color: #ccc;
}

button {
  padding: 10px 16px;
  margin: 15px;
  font-size: 16px;
  background: #333;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Pokémon Sprite Ranker</h2>

<div id="counterBar">
  <div class="counterItem"><div class="counterLabel">Gen 1</div><div class="counterValue" id="c1">0%</div></div>
  <div class="counterItem"><div class="counterLabel">Gen 2</div><div class="counterValue" id="c2">0%</div></div>
  <div class="counterItem"><div class="counterLabel">Gen 3</div><div class="counterValue" id="c3">0%</div></div>
  <div class="counterItem"><div class="counterLabel">Gen 4</div><div class="counterValue" id="c4">0%</div></div>
  <div class="counterItem"><div class="counterLabel">Gen 5</div><div class="counterValue" id="c5">0%</div></div>
  <div class="counterItem"><div class="counterLabel">Mod</div><div class="counterValue" id="c6">0%</div></div>
</div>

<div id="list"></div>

<div id="spritePicker">
  <h3>Sprite auswählen</h3>
  <div id="options"></div>
  <button onclick="closePicker()">Schließen</button>
</div>

<script>
const list = document.getElementById("list");
const picker = document.getElementById("spritePicker");
const options = document.getElementById("options");

let currentImg = null;
let selections = {};

const counter = { gen1:0, gen2:0, gen3:0, gen4:0, gen5:0, modern:0 };

async function load() {
  const pokemon = await Promise.all(
    Array.from({length:151}, (_,i)=>
      fetch(`https://pokeapi.co/api/v2/pokemon/${i+1}`).then(r=>r.json())
    )
  );

  const full = await Promise.all(
    pokemon.map(p=>
      fetch(p.species.url)
        .then(r=>r.json())
        .then(s=>({p,s}))
    )
  );

  full.forEach(({p,s})=>{
    const name = s.names.find(n=>n.language.name==="de")?.name || p.name;
    create(p,name);
  });
}

function create(data,name){
  const div=document.createElement("div");
  div.className="pokemon";

  const img=document.createElement("img");
  img.src=data.sprites.front_default;

  const p=document.createElement("p");
  p.innerText=name;

  div.appendChild(img);
  div.appendChild(p);
  div.onclick=()=>open(data,img);

  list.appendChild(div);
}

function getSprites(d){
  const s=d.sprites;
  const name=d.name;

  return [
    {src:s.versions?.["generation-i"]?.["red-blue"]?.front_default,label:"Gen1",gen:"gen1"},
    {src:s.versions?.["generation-ii"]?.crystal?.front_default,label:"Gen2",gen:"gen2"},
    {src:s.versions?.["generation-iii"]?.emerald?.front_default,label:"Gen3",gen:"gen3"},
    {src:s.versions?.["generation-iv"]?.platinum?.front_default,label:"Gen4",gen:"gen4"},
    {src:s.versions?.["generation-v"]?.["black-white"]?.front_default,label:"Gen5",gen:"gen5"},
    {src:`https://play.pokemonshowdown.com/sprites/ani/${name}.gif`,label:"Modern",gen:"modern"}
  ].filter(x=>x.src);
}

function updateCounter(){
  const total=Object.values(counter).reduce((a,b)=>a+b,0);
  if(!total) return;

  c1.innerText=Math.round(counter.gen1/total*100)+"%";
  c2.innerText=Math.round(counter.gen2/total*100)+"%";
  c3.innerText=Math.round(counter.gen3/total*100)+"%";
  c4.innerText=Math.round(counter.gen4/total*100)+"%";
  c5.innerText=Math.round(counter.gen5/total*100)+"%";
  c6.innerText=Math.round(counter.modern/total*100)+"%";
}

function open(data,img){
  currentImg=img;
  options.innerHTML="";

  getSprites(data).forEach(s=>{
    const wrap=document.createElement("div");
    wrap.className="sprite";

    const im=document.createElement("img");
    im.src=s.src;

    const label=document.createElement("div");
    label.className="label";
    label.innerText=s.label;

    im.onclick=()=>{
      const id=data.id;
      const old=selections[id];

      if(old) counter[old]=Math.max(0,counter[old]-1);

      selections[id]=s.gen;
      counter[s.gen]++;

      currentImg.src=s.src;
      updateCounter();
      closePicker();
    };

    wrap.appendChild(im);
    wrap.appendChild(label);
    options.appendChild(wrap);
  });

  picker.style.display="block";
}

function closePicker(){
  picker.style.display="none";
}

load();
</script>

</body>
</html>
