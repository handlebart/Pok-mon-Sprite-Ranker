<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pokémon Sprite Ranker</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background:
    radial-gradient(circle at 20% 20%, #ff3b3b55, transparent 40%),
    radial-gradient(circle at 80% 30%, #3b82ff55, transparent 40%),
    radial-gradient(circle at 50% 80%, #22c55e55, transparent 40%),
    #0b0f1a;
}

#start {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: black;
  margin: 0;
}

h2 {
  font-family: "Press Start 2P", monospace;
  font-size: 18px;
  margin-bottom: 40px;
}

.pokeballBtn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: none;
  margin: 20px;
  cursor: pointer;
  background: linear-gradient(to bottom, #ff2a2a 50%, white 50%);
  position: relative;
}

.pokeballBtn::before {
  content:"";
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:8px;
  background:black;
  transform:translateY(-50%);
}

.pokeballBtn::after {
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  background:white;
  border:5px solid black;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.btnLabel {
  font-family:"Press Start 2P";
  font-size:11px;
}

#app { display:none; }

#backBtn {
  position: fixed;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1000;
}

#resetBtn {
  position: fixed;
  left: 10px;
  top: calc(50% + 60px);
  z-index: 1000;
}

#shinyBtn {
  position: fixed;
  left: 10px;
  top: calc(50% + 120px);
  z-index: 1000;
}

#counterBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 6px;
  padding: 8px;
  font-size: 11px;
  z-index: 999;
  backdrop-filter: blur(6px);
}

.counterItem {
  flex: 1;
  padding: 6px;
  border-radius: 8px;
  border: 1px solid #333;
  background: rgba(0,0,0,0.65);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
}

.g1 { border-color:#ff5959; }
.g2 { border-color:#ffd166; }
.g3 { border-color:#06d6a0; }
.g4 { border-color:#118ab2; }
.g5 { border-color:#9b5de5; }
.g6 { border-color:#f15bb5; }

#list {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.pokemon {
  width: 92%;
  max-width: 340px;
  margin: 10px;
  padding: 12px;
  background: rgba(0,0,0,0.65);
  border-radius: 12px;
}

.pokemon img { width: 96px; }

#spritePicker {
  position: fixed;
  inset: 0;
  background: rgba(5,10,25,0.97);
  display: none;
  padding: 90px 20px 40px;
  overflow-y: auto;
  text-align: center;
}

#options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 18px;
  margin-top: 20px;
  justify-items: center;
}

.sprite img {
  width: 110px;
  cursor: pointer;
}

.label {
  margin-top: 6px;
  font-size: 12px;
  color: #cbd5e1;
}

button {
  padding: 10px 14px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
}
</style>
</head>

<body>

<div id="start">
  <h2>Was willst du ranken?</h2>

  <div>
    <button class="pokeballBtn" onclick="startGen(1)"></button>
    <div class="btnLabel">GEN 1</div>
  </div>

  <div>
    <button class="pokeballBtn" onclick="startGen(2)"></button>
    <div class="btnLabel">GEN 2</div>
  </div>
</div>

<div id="app">
  <div id="counterBar"></div>
  <button id="backBtn" onclick="back()">← Zurück</button>
  <button id="resetBtn" onclick="resetAll()">Reset</button>
  <button id="shinyBtn" onclick="toggleShiny()">Alle Shiny</button>
  <div id="list"></div>
</div>

<div id="spritePicker">
  <h3>Sprite auswählen</h3>
  <div id="options"></div>
  <button onclick="closePicker()">Schließen</button>
</div>

<script>
let range=[1,151],mode=1;
let selections={};
let counter={};
let shinyAll=false;

const STORAGE_KEY="poke_rankings";

const list=document.getElementById("list");
const counterBar=document.getElementById("counterBar");
const options=document.getElementById("options");
const picker=document.getElementById("spritePicker");

let currentImg=null;

/* STORAGE */
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(selections));
}

function restore(){
  const data = localStorage.getItem(STORAGE_KEY);
  if(data) selections = JSON.parse(data);
}

/* SHINY TOGGLE */
function toggleShiny(){
  shinyAll = !shinyAll;
  renderAllSprites();
}

/* UPDATE LIST SPRITES */
function renderAllSprites(){
  document.querySelectorAll(".pokemon").forEach(div=>{
    const data = JSON.parse(div.dataset.poke);
    const img = div.querySelector("img");

    const sprites = getSprites(data);

    if(selections[data.id]){
      const match = sprites.find(s => s.gen === selections[data.id]);
      if(match) img.src = match.src;
    } else {
      img.src = shinyAll ? getDefaultSprite(data, true) : data.sprites.front_default;
    }
  });
}

/* DEFAULT SPRITE */
function getDefaultSprite(d, forceShiny=false){
  const name=d.name.replace(/-/g,"");
  if(!forceShiny && !shinyAll) return d.sprites.front_default;
  return d.sprites.front_shiny || d.sprites.front_default;
}

/* COUNTER */
function rebuildCounter(){
  Object.keys(counter).forEach(k => counter[k]=0);

  Object.entries(selections).forEach(([id,gen])=>{
    if(counter[gen] !== undefined){
      counter[gen]++;
    }
  });
}

function buildCounterBar(){
  counterBar.innerHTML="";

  const gens = mode===1
    ? ["gen1","gen2","gen3","gen4","gen5","modern"]
    : ["gen2","gen3","gen4","gen5","modern"];

  const labels={
    gen1:"Gen 1",
    gen2:"Gen 2",
    gen3:"Gen 3",
    gen4:"Gen 4",
    gen5:"Gen 5",
    modern:"Modern"
  };

  gens.forEach((g,i)=>{
    counter[g]=0;

    const div=document.createElement("div");
    div.className="counterItem g"+(i+1);

    div.innerHTML=`
      <div>${labels[g]}</div>
      <div id="${g}">0%</div>
    `;

    counterBar.appendChild(div);
  });
}

function updateCounter(){
  const total=Object.values(counter).reduce((a,b)=>a+b,0);
  if(!total){
    Object.keys(counter).forEach(k=>{
      const el=document.getElementById(k);
      if(el) el.innerText="0%";
    });
    return;
  }

  Object.keys(counter).forEach(k=>{
    const el=document.getElementById(k);
    if(el) el.innerText=Math.round(counter[k]/total*100)+"%";
  });
}

/* APP */
function startGen(gen){
  mode=gen;
  document.getElementById("start").style.display="none";
  document.getElementById("app").style.display="block";

  list.innerHTML="";
  selections={};
  counter={};

  range=gen===1?[1,151]:[152,251];

  buildCounterBar();
  load();
}

function back(){
  document.getElementById("app").style.display="none";
  document.getElementById("start").style.display="block";
}

function resetAll(){
  localStorage.removeItem(STORAGE_KEY);
  selections={};

  document.querySelectorAll(".pokemon img").forEach(img=>{
    img.src = img.dataset.default;
  });

  buildCounterBar();
  updateCounter();
}

/* LOAD */
async function load(){
  restore();

  const ids=[];
  for(let i=range[0]; i<=range[1]; i++) ids.push(i);

  const promises=ids.map(async id=>{
    try{
      const d=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>r.json());
      const s=await fetch(d.species.url).then(r=>r.json());

      const name=
        s.names.find(n=>n.language.name==="de")?.name ||
        d.name;

      return {id:d.id,data:d,name};
    }catch{return null;}
  });

  const results=(await Promise.all(promises))
    .filter(Boolean)
    .sort((a,b)=>a.id-b.id);

  results.forEach(p=>create(p.data,p.name));

  rebuildCounter();
  updateCounter();
}

/* CREATE */
function create(d,name){
  const div=document.createElement("div");
  div.className="pokemon";

  const img=document.createElement("img");
  img.src = shinyAll ? getDefaultSprite(d,true) : d.sprites.front_default;
  img.dataset.default = d.sprites.front_default;

  div.dataset.poke = JSON.stringify({
    id:d.id,
    name:d.name,
    sprites:d.sprites
  });

  const p=document.createElement("p");
  p.innerText=name;

  div.append(img,p);
  div.onclick=()=>open(d,img);

  list.appendChild(div);
}

/* SPRITES */
function getSprites(d){
  const s=d.sprites;
  const name=d.name.replace(/-/g,"");

  const arr=[
    {
      src: shinyAll ? (s.versions?.["generation-i"]?.["red-blue"]?.front_shiny || s.versions?.["generation-i"]?.["red-blue"]?.front_default)
                    : s.versions?.["generation-i"]?.["red-blue"]?.front_default,
      gen:"gen1",label:"Gen 1"
    },
    {
      src: shinyAll ? (s.versions?.["generation-ii"]?.crystal?.front_shiny || s.versions?.["generation-ii"]?.crystal?.front_default)
                    : s.versions?.["generation-ii"]?.crystal?.front_default,
      gen:"gen2",label:"Gen 2"
    },
    {
      src: shinyAll ? (s.versions?.["generation-iii"]?.emerald?.front_shiny || s.versions?.["generation-iii"]?.emerald?.front_default)
                    : s.versions?.["generation-iii"]?.emerald?.front_default,
      gen:"gen3",label:"Gen 3"
    },
    {
      src: shinyAll ? (s.versions?.["generation-iv"]?.platinum?.front_shiny || s.versions?.["generation-iv"]?.platinum?.front_default)
                    : s.versions?.["generation-iv"]?.platinum?.front_default,
      gen:"gen4",label:"Gen 4"
    },
    {
      src: shinyAll
        ? (s.versions?.["generation-v"]?.["black-white"]?.animated_shiny ||
           s.versions?.["generation-v"]?.["black-white"]?.front_shiny ||
           s.versions?.["generation-v"]?.["black-white"]?.front_default)
        : (s.versions?.["generation-v"]?.["black-white"]?.animated?.front_default ||
           s.versions?.["generation-v"]?.["black-white"]?.front_default),
      gen:"gen5",label:"Gen 5"
    },
    {
      src: shinyAll
        ? `https://play.pokemonshowdown.com/sprites/ani-shiny/${name}.gif`
        : `https://play.pokemonshowdown.com/sprites/ani/${name}.gif`,
      gen:"modern",label:"Modern"
    }
  ];

  return mode===1
    ? arr.filter(x=>x.src)
    : arr.filter(x=>x.src && x.gen!=="gen1");
}

/* PICKER */
function open(d,img){
  currentImg=img;
  options.innerHTML="";
  document.body.style.overflow="hidden";

  getSprites(d).forEach(s=>{
    const wrap=document.createElement("div");
    wrap.className="sprite";

    const im=document.createElement("img");
    im.src=s.src;

    const label=document.createElement("div");
    label.className="label";
    label.innerText=s.label;

    im.onclick=()=>{
      if(selections[d.id]) counter[selections[d.id]]--;

      selections[d.id]=s.gen;
      counter[s.gen]++;

      currentImg.src=s.src;

      save();
      updateCounter();
      closePicker();
    };

    wrap.append(im,label);
    options.appendChild(wrap);
  });

  picker.style.display="block";
}

function closePicker(){
  picker.style.display="none";
  document.body.style.overflow="";
}

</script>

</body>
</html>
