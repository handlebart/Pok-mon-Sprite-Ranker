<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pokémon Sprite Ranking</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
  text-align: center;
}

/* ===== HOME ===== */
#home {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 20px;
}

button {
  padding: 12px 20px;
  font-size: 18px;
  background: #333;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #555;
}

/* ===== COUNTER ===== */
#counterBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  display: flex;
  gap: 6px;
  padding: 8px;
  background: #000;
}

.counterItem {
  flex: 1;
  background: #1a1a1a;
  padding: 5px;
  border-radius: 6px;
}

/* ===== LIST ===== */
#list {
  margin-top: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.pokemon {
  margin: 10px;
  padding: 10px;
  background: #1a1a1a;
  border-radius: 8px;
}

.pokemon img {
  width: 96px;
}

/* ===== BATTLE ===== */
#battleMode {
  display: none;
  margin-top: 80px;
}

#battle {
  display: flex;
  justify-content: center;
  gap: 40px;
}

#battle img {
  width: 120px;
  cursor: pointer;
  transition: transform 0.2s;
}

#battle img:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>Pokémon Sprite Ranking</h1>
  <button onclick="startRanking()">Sprite Ranking</button>
  <button onclick="startBattleMode()">Sprite Battle</button>
</div>

<!-- RANKING -->
<div id="rankingMode" style="display:none;">
  <div id="counterBar">
    <div class="counterItem" id="c1">0%</div>
    <div class="counterItem" id="c2">0%</div>
  </div>
  <div id="list"></div>
</div>

<!-- BATTLE -->
<div id="battleMode">
  <h2>Battle Mode</h2>
  <div id="battle">
    <img id="left">
    <img id="right">
  </div>
</div>

<script>
let pokemonData = [];
let selections = {};
let counter = {gen1:0,gen2:0};

/* LOAD */
async function loadData(){
  const promises=[];
  for(let i=1;i<=151;i++){
    promises.push(fetch(`https://pokeapi.co/api/v2/pokemon/`).then(r=>r.json()));
  }
  pokemonData = await Promise.all(promises);
}

/* NAV */
function startRanking(){
  home.style.display="none";
  rankingMode.style.display="block";
  initRanking();
}

function startBattleMode(){
  home.style.display="none";
  battleMode.style.display="block";
  startBattle();
}

/* SPRITES */
function getSprites(d){
  return [
    {src:d.sprites.front_default,gen:"gen1"},
    {src:d.sprites.back_default,gen:"gen2"}
  ].filter(x=>x.src);
}

/* RANKING */
function initRanking(){
  list.innerHTML="";
  pokemonData.forEach(d=>{
    const div=document.createElement("div");
    div.className="pokemon";

    const img=document.createElement("img");
    img.src=d.sprites.front_default;

    div.onclick=()=>{
      const s=getSprites(d)[Math.floor(Math.random()*2)];

      const old=selections[d.id];
      if(old) counter[old]--;

      selections[d.id]=s.gen;
      counter[s.gen]++;

      img.src=s.src;
      updateCounter();
    };

    div.appendChild(img);
    list.appendChild(div);
  });
}

function updateCounter(){
  const total=counter.gen1+counter.gen2;
  if(!total)return;

  c1.innerText=Math.round(counter.gen1/total*100)+"%";
  c2.innerText=Math.round(counter.gen2/total*100)+"%";
}

/* BATTLE */
let currentBattle;

function startBattle(){
  const a=Math.floor(Math.random()*pokemonData.length);
  let b;
  do{
    b=Math.floor(Math.random()*pokemonData.length);
  }while(a===b);

  currentBattle=[pokemonData[a],pokemonData[b]];

  left.src=currentBattle[0].sprites.front_default;
  right.src=currentBattle[1].sprites.front_default;
}

left.onclick=()=>startBattle();
right.onclick=()=>startBattle();

/* INIT */
loadData();
</script>

</body>
</html>
