<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pokémon Sprite Ranker</title>

<link href="https://fonts.cdnfonts.com/css/pokemon-solid" rel="stylesheet">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
  text-align: center;
  padding-top: 70px;
}

/* HOME SCREEN */
#homeScreen {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  transition: opacity 0.6s ease;
}

.title {
  font-family: 'Pokemon Solid', Arial, sans-serif;
  font-size: 48px;
  color: #ffcb05;
  letter-spacing: 3px;
  text-shadow:
    4px 4px 0 #2a75bb,
    -2px -2px 0 #2a75bb;
  margin-bottom: 50px;
}

/* Pokéball */
#pokeballBtn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
  transition: transform 0.2s;
}

#pokeballBtn:hover {
  transform: scale(1.1);
}

#pokeballBtn .top {
  background: #ff3b3b;
  height: 50%;
}

#pokeballBtn .bottom {
  background: #fff;
  height: 50%;
}

#pokeballBtn .middle {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 10px;
  background: black;
  transform: translateY(-50%);
}

#pokeballBtn::after {
  content: "";
  position: absolute;
  width: 28px;
  height: 28px;
  background: white;
  border: 6px solid black;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.startText {
  margin-top: 20px;
  font-size: 16px;
  letter-spacing: 2px;
  color: #ccc;
}

.zoomOut {
  transform: scale(1.5);
  opacity: 0;
  transition: all 0.6s ease;
}

/* COUNTER */
#counterBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  display: flex;
  justify-content: space-between;
  gap: 6px;
  padding: 8px;
  background: #000;
  border-bottom: 1px solid #222;
  font-size: 11px;
}

.counterItem {
  flex: 1;
  border-radius: 6px;
  padding: 6px 4px;
  background: #1a1a1a;
  border: 1px solid #333;
}

.counterLabel {
  font-size: 10px;
  color: #ddd;
}

.counterValue {
  font-size: 13px;
  font-weight: bold;
  margin-top: 2px;
}

.g1 { border-color: #ff5959; }
.g2 { border-color: #ffd166; }
.g3 { border-color: #06d6a0; }
.g4 { border-color: #118ab2; }
.g5 { border-color: #9b5de5; }
.g6 { border-color: #f15bb5; }

/* LIST */
#list {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding-bottom: 40px;
}

.pokemon {
  border: 1px solid #333;
  padding: 10px;
  width: 90%;
  max-width: 320px;
  background: #1a1a1a;
  border-radius: 8px;
}

.pokemon img {
  width: 96px;
}

.pokemon p {
  margin: 6px 0 0 0;
  font-size: 16px;
}

/* PICKER */
#spritePicker {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  overflow-y: auto;
  padding: 20px;
}

.sprite {
  display: inline-block;
  margin: 10px;
  text-align: center;
}

.sprite img {
  width: 96px;
  display: block;
}

.label {
  font-size: 11px;
  margin-top: 4px;
  color: #ccc;
}

button {
  padding: 10px 16px;
  margin: 15px;
  font-size: 16px;
  background: #333;
  color: white;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homeScreen">
  <h1 class="title">Pokémon Sprite Ranking</h1>

  <div id="pokeballBtn">
    <div class="top"></div>
    <div class="middle"></div>
    <div class="bottom"></div>
  </div>

  <p class="startText">START RANKING</p>
</div>

<h2>Pokémon Sprite Ranker</h2>

<div id="counterBar">
  <div class="counterItem g1"><div class="counterLabel">Gen 1</div><div class="counterValue" id="c1">0%</div></div>
  <div class="counterItem g2"><div class="counterLabel">Gen 2</div><div class="counterValue" id="c2">0%</div></div>
  <div class="counterItem g3"><div class="counterLabel">Gen 3</div><div class="counterValue" id="c3">0%</div></div>
  <div class="counterItem g4"><div class="counterLabel">Gen 4</div><div class="counterValue" id="c4">0%</div></div>
  <div class="counterItem g5"><div class="counterLabel">Gen 5</div><div class="counterValue" id="c5">0%</div></div>
  <div class="counterItem g6"><div class="counterLabel">Modern</div><div class="counterValue" id="c6">0%</div></div>
</div>

<div id="list"></div>

<div id="spritePicker">
  <h3>Sprite auswählen</h3>
  <div id="options"></div>
  <button onclick="closePicker()">Schließen</button>
</div>

<script>
const list = document.getElementById("list");
const picker = document.getElementById("spritePicker");
const options = document.getElementById("options");

let currentImg = null;
let selections = {};

const counter = {
  gen1: 0,
  gen2: 0,
  gen3: 0,
  gen4: 0,
  gen5: 0,
  modern: 0
};

/* START BUTTON */
document.getElementById("pokeballBtn").onclick = () => {
  const home = document.getElementById("homeScreen");
  home.classList.add("zoomOut");

  setTimeout(() => {
    home.style.display = "none";
    load();
  }, 600);
};

async function load() {
  for (let id = 1; id <= 151; id++) {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/`);
    const data = await res.json();

    const speciesRes = await fetch(data.species.url);
    const species = await speciesRes.json();

    const german =
      species.names.find(n => n.language.name === "de")?.name ||
      data.name;

    create(data, german);
  }
}

function create(data, name) {
  const div = document.createElement("div");
  div.className = "pokemon";

  const img = document.createElement("img");
  img.src = data.sprites.front_default;

  const p = document.createElement("p");
  p.innerText = name;

  div.appendChild(img);
  div.appendChild(p);

  img.onclick = () => open(data, img);

  list.appendChild(div);
}

function getSprites(d) {
  const s = d.sprites;
  const name = d.name;

  return [
    { src: s.versions?.["generation-i"]?.["red-blue"]?.front_default, label: "Gen 1", gen: "gen1" },
    { src: s.versions?.["generation-ii"]?.crystal?.front_default, label: "Gen 2", gen: "gen2" },
    { src: s.versions?.["generation-iii"]?.emerald?.front_default, label: "Gen 3", gen: "gen3" },
    { src: s.versions?.["generation-iv"]?.platinum?.front_default, label: "Gen 4", gen: "gen4" },
    {
      src: s.versions?.["generation-v"]?.["black-white"]?.animated?.front_default ||
           s.versions?.["generation-v"]?.["black-white"]?.front_default,
      label: "Gen 5",
      gen: "gen5"
    },
    {
      src: `https://play.pokemonshowdown.com/sprites/ani/.gif`,
      label: "Modern",
      gen: "modern"
    }
  ].filter(x => x.src);
}

function updateCounter() {
  const total =
    counter.gen1 + counter.gen2 + counter.gen3 +
    counter.gen4 + counter.gen5 + counter.modern;

  if (!total) return;

  document.getElementById("c1").innerText = Math.round(counter.gen1 / total * 100) + "%";
  document.getElementById("c2").innerText = Math.round(counter.gen2 / total * 100) + "%";
  document.getElementById("c3").innerText = Math.round(counter.gen3 / total * 100) + "%";
  document.getElementById("c4").innerText = Math.round(counter.gen4 / total * 100) + "%";
  document.getElementById("c5").innerText = Math.round(counter.gen5 / total * 100) + "%";
  document.getElementById("c6").innerText = Math.round(counter.modern / total * 100) + "%";
}

function open(data, img) {
  currentImg = img;
  options.innerHTML = "";

  getSprites(data).forEach(s => {

    const wrap = document.createElement("div");
    wrap.className = "sprite";

    const im = document.createElement("img");
    im.src = s.src;

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = s.label;

    im.onclick = () => {
      const id = data.id;
      const newGen = s.gen;
      const oldGen = selections[id];

      if (oldGen === newGen) {
        closePicker();
        return;
      }

      if (oldGen) {
        counter[oldGen] = Math.max(0, counter[oldGen] - 1);
      }

      selections[id] = newGen;
      counter[newGen]++;

      currentImg.src = s.src;
      updateCounter();
      closePicker();
    };

    wrap.appendChild(im);
    wrap.appendChild(label);
    options.appendChild(wrap);
  });

  picker.style.display = "block";
}

function closePicker() {
  picker.style.display = "none";
}
</script>

</body>
</html>
