<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pokémon Sprite Ranker</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background:
    radial-gradient(circle at 20% 20%, #ff3b3b55, transparent 40%),
    radial-gradient(circle at 80% 30%, #3b82ff55, transparent 40%),
    radial-gradient(circle at 50% 80%, #22c55e55, transparent 40%),
    #0b0f1a;
}

/* START */
#start { margin-top: 90px; }

h2 {
  font-family: "Press Start 2P", monospace;
  font-size: 18px;
}

/* POKEBALL */
.pokeballBtn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: none;
  margin: 20px;
  cursor: pointer;
  background: linear-gradient(to bottom, #ff2a2a 50%, white 50%);
  position: relative;
}

.pokeballBtn::before {
  content:"";
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:8px;
  background:black;
  transform:translateY(-50%);
}

.pokeballBtn::after {
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  background:white;
  border:5px solid black;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.btnLabel {
  font-family:"Press Start 2P";
  font-size:11px;
}

/* APP */
#app { display:none; }

/* 🔥 FIXED STICKY BAR (FARBIG BLEIBT) */
#counterBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display:flex;
  gap:6px;
  padding:8px;
  font-size:11px;
  z-index:999;
}

.counterItem {
  flex:1;
  padding:6px;
  border-radius:8px;
  background: rgba(0,0,0,0.65);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Farben wieder aktiv */
.g1 { border:1px solid #ff5959; }
.g2 { border:1px solid #ffd166; }
.g3 { border:1px solid #06d6a0; }
.g4 { border:1px solid #118ab2; }
.g5 { border:1px solid #9b5de5; }
.g6 { border:1px solid #f15bb5; }

/* 🔥 FIX: Layout spacing für Button */
.topControls {
  position: fixed;
  top: 70px;
  left: 10px;
  z-index: 1000;
}

/* LIST */
#list {
  margin-top:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.pokemon {
  width:92%;
  max-width:340px;
  margin:10px;
  padding:12px;
  background:rgba(0,0,0,0.65);
  border-radius:12px;
}

/* PICKER */
#spritePicker {
  position:fixed;
  inset:0;
  background:rgba(5,10,25,0.97);
  display:none;
  padding:20px;
  overflow-y:auto;
}

#options {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:18px;
}

.sprite img {
  width:110px;
  cursor:pointer;
}

.label {
  font-size:12px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<div id="start">
  <h2>Was willst du ranken?</h2>

  <button class="pokeballBtn" onclick="startGen(1)"></button>
  <div class="btnLabel">GEN 1</div>

  <button class="pokeballBtn" onclick="startGen(2)"></button>
  <div class="btnLabel">GEN 2</div>
</div>

<div id="app">

  <!-- 🔥 FIX: Zurück-Button aus Sticky-Bar raus -->
  <div class="topControls">
    <button onclick="back()">← Zurück</button>
  </div>

  <div id="counterBar"></div>
  <div id="list"></div>
</div>

<div id="spritePicker">
  <h3>Sprite auswählen</h3>
  <div id="options"></div>
</div>

<script>
let range=[1,151];
let mode=1;

let selections={};
let counter={};

const list=document.getElementById("list");
const counterBar=document.getElementById("counterBar");
const options=document.getElementById("options");

let currentImg=null;

async function load(){
  for(let id=range[0]; id<=range[1]; id++){
    try{
      const d=await fetch(`https://pokeapi.co/api/v2/pokemon/`).then(r=>r.json());
      const s=await fetch(d.species.url).then(r=>r.json());

      const name =
        s.names.find(n=>n.language.name==="de")?.name ||
        d.name;

      create(d,name);

    }catch(e){}
  }
}

function startGen(gen){
  mode=gen;
  document.getElementById("start").style.display="none";
  document.getElementById("app").style.display="block";

  list.innerHTML="";
  selections={};
  counter={};

  range = gen===1 ? [1,151] : [152,251];

  buildCounterBar();
  load();
}

function back(){
  document.getElementById("app").style.display="none";
  document.getElementById("start").style.display="block";
}

function buildCounterBar(){
  counterBar.innerHTML="";

  const gens = mode===1
    ? ["gen1","gen2","gen3","gen4","gen5","modern"]
    : ["gen2","gen3","gen4","gen5","modern"];

  const labels={
    gen1:"Gen 1",
    gen2:"Gen 2",
    gen3:"Gen 3",
    gen4:"Gen 4",
    gen5:"Gen 5",
    modern:"Modern"
  };

  gens.forEach((g,i)=>{
    counter[g]=0;

    const div=document.createElement("div");
    div.className="counterItem g"+(i+1);

    div.innerHTML=`
      <div></div>
      <div id="">0%</div>
    `;

    counterBar.appendChild(div);
  });
}

function create(d,name){
  const div=document.createElement("div");
  div.className="pokemon";

  const img=document.createElement("img");
  img.src=d.sprites.front_default;

  const p=document.createElement("p");
  p.innerText=name;

  div.append(img,p);
  div.onclick=()=>open(d,img);

  list.appendChild(div);
}

function getSprites(d){
  const s=d.sprites;
  const name=d.name.replace(/-/g,"");

  const arr=[
    {src:s.versions?.["generation-i"]?.["red-blue"]?.front_default,gen:"gen1",label:"Gen 1"},
    {src:s.versions?.["generation-ii"]?.crystal?.front_default,gen:"gen2",label:"Gen 2"},
    {src:s.versions?.["generation-iii"]?.emerald?.front_default,gen:"gen3",label:"Gen 3"},
    {src:s.versions?.["generation-iv"]?.platinum?.front_default,gen:"gen4",label:"Gen 4"},
    {
      src:s.versions?.["generation-v"]?.["black-white"]?.animated?.front_default ||
          s.versions?.["generation-v"]?.["black-white"]?.front_default,
      gen:"gen5",
      label:"Gen 5"
    },
    {
      src:`https://play.pokemonshowdown.com/sprites/ani/.gif`,
      gen:"modern",
      label:"Modern"
    }
  ];

  return mode===1
    ? arr.filter(x=>x.src)
    : arr.filter(x=>x.src && x.gen!=="gen1");
}

function open(d,img){
  currentImg=img;
  options.innerHTML="";
  document.body.style.overflow="hidden";

  getSprites(d).forEach(s=>{
    const wrap=document.createElement("div");
    wrap.className="sprite";

    const im=document.createElement("img");
    im.src=s.src;

    const label=document.createElement("div");
    label.className="label";
    label.innerText=s.label;

    im.onclick=()=>{
      if(selections[d.id]) counter[selections[d.id]]--;

      selections[d.id]=s.gen;
      counter[s.gen]++;

      currentImg.src=s.src;
      update();
      closePicker();
    };

    wrap.append(im,label);
    options.appendChild(wrap);
  });

  document.getElementById("spritePicker").style.display="block";
}

function update(){
  const total=Object.values(counter).reduce((a,b)=>a+b,0);
  if(!total)return;

  Object.keys(counter).forEach(k=>{
    const el=document.getElementById(k);
    if(el) el.innerText=Math.round(counter[k]/total*100)+"%";
  });
}

function closePicker(){
  document.getElementById("spritePicker").style.display="none";
  document.body.style.overflow="";
}
</script>

</body>
</html>
